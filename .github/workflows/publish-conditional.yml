name: NPM Check, Publish and Notify

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      was_published: ${{ steps.publish-step.outputs.was_published }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Publish to npm
        id: publish-step
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          BEFORE_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "None")
          
          echo "### 🚀 NPM Publication Summary" >> $GITHUB_STEP_SUMMARY
          echo "* **Package**: \`$PACKAGE_NAME\`" >> $GITHUB_STEP_SUMMARY
          echo "* **Git Repository**: [https://github.com/${{ github.repository }}](https://github.com/${{ github.repository }})" >> $GITHUB_STEP_SUMMARY
          echo "* **Before Publish Version**: \`$BEFORE_VERSION\`" >> $GITHUB_STEP_SUMMARY
          
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "Version ${PACKAGE_VERSION} of ${PACKAGE_NAME} is already published on npm. Skipping publish."
            echo "* **After Publish Version**: \`$BEFORE_VERSION\`" >> $GITHUB_STEP_SUMMARY
            echo "* **Status**: ⚠️ Skipped (Version $PACKAGE_VERSION is already published on NPM)" >> $GITHUB_STEP_SUMMARY
            echo "was_published=false" >> $GITHUB_OUTPUT
          else
            npm publish
            echo "* **After Publish Version**: \`$PACKAGE_VERSION\`" >> $GITHUB_STEP_SUMMARY
            echo "* **Status**: ✅ Successfully Published to NPM" >> $GITHUB_STEP_SUMMARY
            echo "was_published=true" >> $GITHUB_OUTPUT
          fi
          echo "* **Registry Link**: [https://www.npmjs.com/package/$PACKAGE_NAME](https://www.npmjs.com/package/$PACKAGE_NAME)" >> $GITHUB_STEP_SUMMARY
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  notify-dependents:
    needs: publish
    if: needs.publish.outputs.was_published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Notify dependents
        run: |
          echo "### 🔔 Dependency Notification Status" >> $GITHUB_STEP_SUMMARY
          RESPONSE1=$(curl -s -w "%{http_code}" -o resp1.json -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.REPO_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/keshavsoft/pattern-collector-routesjs-pull-lines/dispatches \
            -d '{"event_type":"dependency-updated"}')
          if [ "$RESPONSE1" = "204" ]; then
            echo "* **pattern-collector-routesjs-pull-lines**: ✅ Dispatched successfully (HTTP 204)" >> $GITHUB_STEP_SUMMARY
          else
            echo "* **pattern-collector-routesjs-pull-lines**: ❌ Failed to dispatch (HTTP $RESPONSE1)" >> $GITHUB_STEP_SUMMARY
            cat resp1.json >> $GITHUB_STEP_SUMMARY
          fi
